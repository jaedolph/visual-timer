<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Visual Timer</title>
  <link id="favicon" rel="icon" type="image/png" href="">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/app-192.svg">
  <meta name="theme-color" id="theme-color" content="#22c55e">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color: #22c55e;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      padding:
        env(safe-area-inset-top, 0px)
        env(safe-area-inset-right, 0px)
        env(safe-area-inset-bottom, 0px)
        env(safe-area-inset-left, 0px);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Preset buttons ── */
    .preset-row {
      display: flex;
      gap: 0.4rem;
      padding: 0.6rem 0.7rem 0.3rem;
      justify-content: center;
    }

    .preset-btn {
      flex: 1;
      padding: 0.55rem 0.2rem;
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      font-weight: 700;
      border-radius: 0.7rem;
      border: 2.5px solid #ccc;
      background: white;
      color: #444;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 0;
    }

    .preset-btn.active {
      background: var(--color);
      border-color: var(--color);
      color: white;
    }

    .preset-btn:active { transform: scale(0.93); }

    /* ── Canvas ── */
    .timer-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.4rem;
      min-height: 0;
    }

    #timer-canvas {
      display: block;
      cursor: pointer;
    }

    /* ── Color swatches ── */
    .color-row {
      display: flex;
      gap: clamp(0.4rem, 2vw, 0.8rem);
      padding: 0.3rem 0.7rem;
      justify-content: center;
      align-items: center;
    }

    .swatch {
      width: clamp(30px, 7vw, 42px);
      height: clamp(30px, 7vw, 42px);
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .swatch.active {
      border-color: white;
      box-shadow: 0 0 0 2.5px #333;
      transform: scale(1.25);
    }

    .swatch:active { transform: scale(0.88); }

    .swatch-custom {
      position: relative;
      overflow: hidden;
      background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    }

    .swatch-custom input[type="color"] {
      position: absolute;
      inset: -10px;
      width: calc(100% + 20px);
      height: calc(100% + 20px);
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    /* ── Action buttons ── */
    .action-row {
      display: flex;
      gap: 0.6rem;
      padding: 0.35rem 0.7rem 0.6rem;
      justify-content: center;
    }

    .action-btn {
      flex: 1;
      max-width: 200px;
      padding: clamp(0.7rem, 2.5vw, 1rem) 1rem;
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      font-weight: 800;
      border-radius: 1rem;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .action-btn:active { transform: scale(0.95); }

    #start-btn {
      background: var(--color);
      color: white;
    }

    #reset-btn {
      background: #ddd;
      color: #444;
    }

    #start-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    #time-btn {
      background: white;
      color: #555;
      border: 2.5px solid #ccc;
    }

    #time-btn.on {
      background: #555;
      color: white;
      border-color: #555;
    }

    #share-btn {
      flex: 0 0 auto;
      width: clamp(44px, 12vw, 56px);
      max-width: none;
      background: #ddd;
      color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    /* ── Custom time modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 1.2rem;
      padding: 1.5rem;
      width: min(88vw, 300px);
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .modal h2 {
      text-align: center;
      font-size: 1.25rem;
      color: #222;
    }

    .time-inputs {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
    }

    .time-field {
      width: 72px;
      padding: 0.6rem 0.4rem;
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      background: #f4f4f4;
      border: 2px solid #ddd;
      border-radius: 0.6rem;
      color: #222;
      -moz-appearance: textfield;
    }

    .time-field::-webkit-inner-spin-button,
    .time-field::-webkit-outer-spin-button { display: none; }

    .time-field:focus {
      outline: none;
      border-color: var(--color);
    }

    .time-sep {
      font-size: 1.8rem;
      font-weight: 900;
      color: #555;
      line-height: 1;
    }

    .time-label {
      display: flex;
      justify-content: space-around;
      padding: 0 0.2rem;
    }

    .time-label span {
      width: 72px;
      text-align: center;
      font-size: 0.75rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .modal-btns {
      display: flex;
      gap: 0.5rem;
    }

    .modal-btn {
      flex: 1;
      padding: 0.7rem;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 0.7rem;
      border: none;
      cursor: pointer;
    }

    .modal-btn.confirm {
      background: var(--color);
      color: white;
    }

    .modal-btn.cancel {
      background: #eee;
      color: #555;
    }

    /* ── Completion flash ── */
    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .flashing { animation: flash 0.6s ease-in-out 5; }
  </style>
</head>
<body>

  <div class="preset-row" id="preset-row">
    <button class="preset-btn" data-min="1">1 min</button>
    <button class="preset-btn" data-min="2">2 min</button>
    <button class="preset-btn active" data-min="5">5 min</button>
    <button class="preset-btn" data-min="10">10 min</button>
    <button class="preset-btn" data-min="15">15 min</button>
    <button class="preset-btn" id="custom-preset-btn">Custom</button>
  </div>

  <div class="timer-wrap" id="timer-wrap">
    <canvas id="timer-canvas"></canvas>
  </div>

  <div class="color-row">
    <div class="swatch active" data-color="#22c55e" style="background:#22c55e"></div>
    <div class="swatch" data-color="#3b82f6" style="background:#3b82f6"></div>
    <div class="swatch" data-color="#f97316" style="background:#f97316"></div>
    <div class="swatch" data-color="#ef4444" style="background:#ef4444"></div>
    <div class="swatch" data-color="#a855f7" style="background:#a855f7"></div>
    <div class="swatch" data-color="#f59e0b" style="background:#f59e0b"></div>
    <div class="swatch" data-color="#ec4899" style="background:#ec4899"></div>
    <div class="swatch" data-color="#92400e" style="background:#92400e"></div>
    <div class="swatch" data-color="#1a1a1a" style="background:#1a1a1a"></div>
    <div class="swatch swatch-custom" id="swatch-custom" title="Pick a colour">
      <input type="color" id="color-picker" value="#22c55e">
    </div>
  </div>

  <div class="action-row">
    <button class="action-btn" id="start-btn">Start</button>
    <button class="action-btn" id="reset-btn">Reset</button>
    <button class="action-btn" id="time-btn">Show time</button>
    <button class="action-btn" id="share-btn" aria-label="Share this timer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    </button>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Custom Time</h2>
      <div class="time-inputs">
        <input type="number" class="time-field" id="inp-min" min="0" max="99" value="3">
        <span class="time-sep">:</span>
        <input type="number" class="time-field" id="inp-sec" min="0" max="59" value="0">
      </div>
      <div class="time-label">
        <span>min</span>
        <span>sec</span>
      </div>
      <div class="modal-btns">
        <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn confirm" id="modal-ok">Set Timer</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let duration  = 5 * 60 * 1000;   // ms
    let remaining = duration;
    let running   = false;
    let complete  = false;
    let rafId     = null;
    let lastTs    = null;
    let color     = '#22c55e';
    let showTime  = false;

    // ── Canvas ─────────────────────────────────────────────────────────────
    const canvas  = document.getElementById('timer-canvas');
    const ctx     = canvas.getContext('2d');
    const wrap    = document.getElementById('timer-wrap');

    function resize() {
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      const size = Math.min(w, h);
      canvas.width  = size;
      canvas.height = size;
      draw();
    }

    function draw() {
      const sz = canvas.width;
      const cx = sz / 2;
      const cy = sz / 2;
      const r  = sz * 0.47;

      ctx.clearRect(0, 0, sz, sz);

      // Background disc
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.fillStyle = '#d4d4d4';
      ctx.fill();

      // Coloured arc (clockwise from 12 o'clock, shrinks as time passes)
      const progress = remaining / duration; // 1 → full, 0 → empty

      if (progress > 0.0005) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        const start = -Math.PI / 2;                       // 12 o'clock
        const end   = start + progress * 2 * Math.PI;     // clockwise
        ctx.arc(cx, cy, r, start, end, false);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }

      // Time label (only when enabled)
      if (showTime) {
        const totalSec = Math.ceil(remaining / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec % 60;
        const label = `${m}:${String(s).padStart(2, '0')}`;

        const fs = Math.round(r * 0.36);
        ctx.font = `700 ${fs}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor  = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur   = 6;
        ctx.fillStyle    = 'white';
        ctx.fillText(label, cx, cy);
        ctx.shadowBlur   = 0;
      }
    }

    // ── Timer logic ────────────────────────────────────────────────────────
    function tick(ts) {
      if (!running) return;
      if (lastTs === null) lastTs = ts;

      remaining = Math.max(0, remaining - (ts - lastTs));
      lastTs = ts;
      draw();

      if (remaining <= 0) {
        running  = false;
        complete = true;
        onComplete();
        return;
      }
      rafId = requestAnimationFrame(tick);
    }

    function start() {
      if (complete || remaining <= 0) return;
      running = true;
      lastTs  = null;
      rafId   = requestAnimationFrame(tick);
      updateUI();
    }

    function pause() {
      running = false;
      lastTs  = null;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      updateUI();
    }

    function reset() {
      pause();
      remaining = duration;
      complete  = false;
      draw();
      updateUI();
    }

    function setDuration(ms) {
      if (running) pause();
      duration  = ms;
      remaining = ms;
      complete  = false;
      draw();
      updateUI();
      updateURL();
    }

    function onComplete() {
      updateUI();
      playChime();
      canvas.classList.add('flashing');
      canvas.addEventListener('animationend', () => canvas.classList.remove('flashing'), { once: true });
    }

    function updateUI() {
      const btn = document.getElementById('start-btn');
      if (complete) {
        btn.textContent = 'Done!';
        btn.disabled    = true;
      } else if (running) {
        btn.textContent = 'Pause';
        btn.disabled    = false;
      } else {
        btn.textContent = (remaining < duration) ? 'Resume' : 'Start';
        btn.disabled    = false;
      }
    }

    // ── Sound ──────────────────────────────────────────────────────────────
    function playChime() {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        const ac = new AC();
        const fadeIn  = 2.5;
        const hold    = 0.4;
        const fadeOut = 2.0;
        const total   = fadeIn + hold + fadeOut;
        const t0      = ac.currentTime;

        // Synthetic reverb impulse response
        const irLen    = Math.floor(ac.sampleRate * 2.8);
        const irBuffer = ac.createBuffer(2, irLen, ac.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const d = irBuffer.getChannelData(ch);
          for (let i = 0; i < irLen; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.5);
          }
        }
        const reverb = ac.createConvolver();
        reverb.buffer = irBuffer;

        // Low-pass filter — softens the electronic edge
        const filter = ac.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1800;
        filter.Q.value = 0.5;

        // Dry/wet mix
        const dry = ac.createGain(); dry.gain.value = 0.35;
        const wet = ac.createGain(); wet.gain.value = 0.65;
        filter.connect(dry);    dry.connect(ac.destination);
        filter.connect(reverb); reverb.connect(wet); wet.connect(ac.destination);

        // G major chord: G4, B4, D5
        // Three slightly detuned oscillators per note for a warm chorus/pad quality
        [392.00, 493.88, 587.33].forEach(freq => {
          const noteGain = ac.createGain();
          noteGain.gain.setValueAtTime(0, t0);
          noteGain.gain.linearRampToValueAtTime(0.22, t0 + fadeIn);
          noteGain.gain.setValueAtTime(0.22, t0 + fadeIn + hold);
          noteGain.gain.exponentialRampToValueAtTime(0.001, t0 + total);
          noteGain.connect(filter);

          [-6, 0, 6].forEach(cents => {
            const osc     = ac.createOscillator();
            const oscGain = ac.createGain();
            osc.type            = 'sine';
            osc.frequency.value = freq * Math.pow(2, cents / 1200);
            oscGain.gain.value  = 1 / 3;
            osc.connect(oscGain);
            oscGain.connect(noteGain);
            osc.start(t0);
            osc.stop(t0 + total + 3);
          });
        });
      } catch (_) { /* audio unavailable */ }
    }

    // ── Favicon ────────────────────────────────────────────────────────────
    function updateFavicon() {
      const size = 64;
      const fc = document.createElement('canvas');
      fc.width = fc.height = size;
      const fctx = fc.getContext('2d');
      const cx = size / 2, cy = size / 2, r = size * 0.46;

      // Gray background disc
      fctx.beginPath();
      fctx.arc(cx, cy, r, 0, 2 * Math.PI);
      fctx.fillStyle = '#d4d4d4';
      fctx.fill();

      // Full filled circle
      fctx.beginPath();
      fctx.arc(cx, cy, r, 0, 2 * Math.PI);
      fctx.fillStyle = color;
      fctx.fill();

      // Label: minutes (or seconds for sub-minute durations)
      const totalSec = Math.round(duration / 1000);
      const label = totalSec >= 60 ? String(Math.round(totalSec / 60)) : `${totalSec}s`;
      fctx.font = `bold ${Math.round(size * 0.48)}px sans-serif`;
      fctx.textAlign = 'center';
      fctx.textBaseline = 'middle';
      fctx.shadowColor = 'rgba(0,0,0,0.55)';
      fctx.shadowBlur = 4;
      fctx.fillStyle = 'white';
      fctx.fillText(label, cx, cy);

      document.getElementById('favicon').href = fc.toDataURL('image/png');
    }

    // ── URL state ──────────────────────────────────────────────────────────
    // Uses query params (?t=300&c=ef4444) rather than hash fragments so that
    // Android Chrome "Add to Home Screen" preserves the state in the shortcut URL.
    function updateURL() {
      const secs = Math.round(duration / 1000);
      const params = new URLSearchParams({ t: secs, c: color.replace('#', '') });
      history.replaceState(null, '', '?' + params.toString());
      updateFavicon();
    }

    function applyURLState() {
      const params = new URLSearchParams(window.location.search);
      const secs = parseInt(params.get('t'));
      const hex  = params.get('c');
      if (!(secs > 0) || !hex || !/^[0-9a-fA-F]{6}$/.test(hex)) return;

      // Apply color without triggering updateURL yet
      color = '#' + hex;
      document.documentElement.style.setProperty('--color', color);
      document.getElementById('theme-color').setAttribute('content', color);
      document.getElementById('color-picker').value = color;
      const matchSwatch = document.querySelector(`.swatch[data-color="${color}"]`);
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      if (matchSwatch) matchSwatch.classList.add('active');
      else document.getElementById('swatch-custom').classList.add('active');

      // Apply duration
      duration  = secs * 1000;
      remaining = duration;
      complete  = false;

      // Highlight matching preset button if any
      const mins = secs / 60;
      const matchPreset = document.querySelector(`.preset-btn[data-min="${mins}"]`);
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      if (matchPreset) matchPreset.classList.add('active');
      else document.getElementById('custom-preset-btn').classList.add('active');
    }

    // ── Colour ─────────────────────────────────────────────────────────────
    function applyColor(c) {
      color = c;
      document.documentElement.style.setProperty('--color', c);
      document.getElementById('theme-color').setAttribute('content', c);
      draw();
      updateURL();
    }

    document.querySelector('.color-row').addEventListener('click', e => {
      const sw = e.target.closest('.swatch');
      if (!sw || sw.id === 'swatch-custom') return;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      applyColor(sw.dataset.color);
    });

    document.getElementById('color-picker').addEventListener('input', e => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      document.getElementById('swatch-custom').classList.add('active');
      applyColor(e.target.value);
    });

    // ── Presets ────────────────────────────────────────────────────────────
    document.getElementById('preset-row').addEventListener('click', e => {
      const btn = e.target.closest('.preset-btn');
      if (!btn) return;

      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (btn.id === 'custom-preset-btn') {
        openModal();
      } else {
        setDuration(parseFloat(btn.dataset.min) * 60 * 1000);
      }
    });

    // ── Action buttons ─────────────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
      running ? pause() : start();
    });

    document.getElementById('reset-btn').addEventListener('click', reset);

    document.getElementById('time-btn').addEventListener('click', () => {
      showTime = !showTime;
      const btn = document.getElementById('time-btn');
      btn.textContent = showTime ? 'Hide time' : 'Show time';
      btn.classList.toggle('on', showTime);
      draw();
    });

    // Tap canvas to start/pause
    canvas.addEventListener('click', () => {
      if (complete) return;
      running ? pause() : start();
    });

    // ── Custom time modal ──────────────────────────────────────────────────
    const modal = document.getElementById('modal');

    function openModal() {
      document.getElementById('inp-min').value = '3';
      document.getElementById('inp-sec').value = '0';
      modal.classList.add('open');
      document.getElementById('inp-min').focus();
    }

    document.getElementById('modal-cancel').addEventListener('click', () => {
      modal.classList.remove('open');
    });

    document.getElementById('modal-ok').addEventListener('click', () => {
      const m = Math.max(0, parseInt(document.getElementById('inp-min').value) || 0);
      const s = Math.min(59, Math.max(0, parseInt(document.getElementById('inp-sec').value) || 0));
      const ms = (m * 60 + s) * 1000;
      if (ms > 0) setDuration(ms);
      modal.classList.remove('open');
    });

    // Close modal on backdrop click
    modal.addEventListener('click', e => {
      if (e.target === modal) modal.classList.remove('open');
    });

    // Enter key submits modal
    modal.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('modal-ok').click();
      if (e.key === 'Escape') modal.classList.remove('open');
    });

    // ── Share / shortcut creation ──────────────────────────────────────────
    const SHARE_ICON = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>`;
    const CHECK_ICON = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    document.getElementById('share-btn').addEventListener('click', async () => {
      const url = window.location.href;
      const shareBtn = document.getElementById('share-btn');
      try {
        if (navigator.share) {
          await navigator.share({ title: 'Visual Timer', url });
        } else {
          await navigator.clipboard.writeText(url);
          shareBtn.innerHTML = CHECK_ICON;
          setTimeout(() => { shareBtn.innerHTML = SHARE_ICON; }, 1500);
        }
      } catch (_) {}
    });

    // ── Responsive resize ──────────────────────────────────────────────────
    // window.innerHeight always reflects the visible viewport on iOS Safari,
    // unlike 100vh/dvh which can include browser chrome on older versions.
    function fixBodyHeight() {
      document.body.style.height = window.innerHeight + 'px';
    }
    fixBodyHeight();
    window.addEventListener('resize', function() { fixBodyHeight(); resize(); });

    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(resize).observe(wrap);
    }

    // ── Init ───────────────────────────────────────────────────────────────
    applyURLState();
    resize();
    updateUI();
    updateURL();

    // ── Service Worker (offline support) ───────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
